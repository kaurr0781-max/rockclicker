<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Clicker Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Exo 2', sans-serif;
        background: #0a0f1f;
        color: white;
        overflow-x: hidden;
    }

    /* Cyberpunk Glow */
    .glow {
        text-shadow: 0 0 10px #6a00ff, 0 0 20px #0066ff;
    }

    /* Layout */
    .container {
        display: flex;
        width: 100%;
        height: 100vh;
    }

    /* LEFT COLUMN — Gameplay */
    .left {
        width: 40%;
        padding: 20px;
        text-align: center;
        border-right: 2px solid rgba(255,255,255,0.1);
    }

    #rock {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: radial-gradient(circle, #1a1f3a, #0a0f1f);
        border: 3px solid #6a00ff;
        box-shadow: 0 0 20px #6a00ff;
        margin-top: 40px;
        cursor: pointer;
        transition: 0.1s;
    }

    #rock:active {
        transform: scale(0.95);
        box-shadow: 0 0 30px #0066ff;
    }

    #goldenRock {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: radial-gradient(circle, gold, orange);
        box-shadow: 0 0 25px gold;
        margin: 20px auto;
        display: none;
        cursor: pointer;
    }

    /* MIDDLE COLUMN — Stats + Shop */
    .middle {
        width: 30%;
        padding: 20px;
        border-right: 2px solid rgba(255,255,255,0.1);
    }

    .panel {
        background: rgba(255,255,255,0.05);
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px #6a00ff33;
    }

    .panel h2 {
        margin-top: 0;
        color: #8ab4ff;
    }

    .shop-item {
        padding: 10px;
        background: rgba(255,255,255,0.08);
        margin: 8px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
    }

    .shop-item:hover {
        background: rgba(255,255,255,0.15);
    }

    /* RIGHT COLUMN — Achievements + Leaderboard + Prestige */
    .right {
        width: 30%;
        padding: 20px;
    }

    #prestigeBtn {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        border: none;
        border-radius: 50px; /* Pill shape */
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(90deg, #0066ff, #6a00ff);
        color: white;
        box-shadow: 0 0 15px #6a00ff;
        transition: 0.2s;
    }

    #prestigeBtn:hover {
        box-shadow: 0 0 25px #6a00ff;
        transform: scale(1.03);
    }

    /* Name Screen */
    #nameScreen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #000000dd;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 999;
    }

    #nameInput {
        padding: 10px;
        width: 250px;
        border-radius: 8px;
        border: none;
        margin-bottom: 10px;
        font-size: 18px;
    }

    #saveNameBtn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(90deg, #0066ff, #6a00ff);
        color: white;
        cursor: pointer;
        font-size: 18px;
    }
</style>
</head>

<body>

<!-- NAME SCREEN -->
<div id="nameScreen">
    <h1 class="glow">Enter Your Name</h1>
    <input id="nameInput" placeholder="Your Name">
    <button id="saveNameBtn">Continue</button>
</div>

<div class="container">

    <!-- LEFT COLUMN -->
    <div class="left">
        <h1 class="glow">Rock Clicker</h1>

        <div id="rock"></div>
        <div id="goldenRock"></div>

        <h2 id="comboDisplay">Combo: 0</h2>
    </div>

    <!-- MIDDLE COLUMN -->
    <div class="middle">

        <div class="panel">
            <h2>Stats</h2>
            <p>Rocks: <span id="rockCount">0</span></p>
            <p>Golden Rocks: <span id="goldenCount">0</span></p>
            <p>Per Click: <span id="perClick">1</span></p>
            <p>Per Second: <span id="perSecond">0</span></p>
        </div>

        <div class="panel">
            <h2>Shop</h2>
            <div id="shop"></div>
        </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="right">

        <div class="panel">
            <h2>Achievements</h2>
            <div id="achievements"></div>
        </div>

        <div class="panel">
            <h2>Leaderboard</h2>
            <div id="leaderboard"></div>
        </div>

        <button id="prestigeBtn">Prestige</button>

    </div>

</div>

<script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Clicker</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #1e1e1e;
        color: white;
        margin: 0;
        padding: 0;
        text-align: center;
        user-select: none;
    }

    #nameScreen {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        gap: 20px;
    }

    #gameContainer {
        display: none; /* FIXED */
        height: 100vh;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 40px;
    }

    /* When game should show */
    #gameContainer.show {
        display: flex;
    }

    #rock {
        width: 200px;
        cursor: pointer;
        transition: transform 0.1s;
    }

    #rock:active {
        transform: scale(0.9);
    }

    #goldenRock {
        width: 150px;
        display: none;
        cursor: pointer;
        animation: glow 1s infinite alternate;
    }

    @keyframes glow {
        from { filter: drop-shadow(0 0 5px gold); }
        to { filter: drop-shadow(0 0 20px gold); }
    }

    .particle {
        position: absolute;
        font-size: 20px;
        animation: rise 0.6s ease-out forwards;
        pointer-events: none;
    }

    @keyframes rise {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-40px); }
    }

    .shop button {
        margin: 5px;
        padding: 10px;
        background: #333;
        color: white;
        border: 1px solid #555;
        cursor: pointer;
    }

    .shop button:hover {
        background: #444;
    }

    .ach {
        margin: 5px;
        padding: 10px;
        background: #222;
        border-left: 4px solid #555;
        text-align: left;
    }

    .ach.unlocked {
        border-left: 4px solid #22c55e;
    }
</style>
</head>
<body>

<h1>Rock Clicker</h1>

<!-- NAME SCREEN -->
<div id="nameScreen">
    <h2>ROCK CLICKER — ENTER YOUR NAME</h2>
    <input id="playerNameInput" placeholder="Your name" style="padding:10px;font-size:16px;">
    <button id="startBtn" style="padding:10px 20px;font-size:16px;background:#22c55e;border:none;color:white;cursor:pointer;">
        Start Game
    </button>
</div>

<!-- GAME SCREEN -->
<div id="gameContainer">
    <div>
        <img id="rock" src="rock.png">
        <img id="goldenRock" src="rock.png">

        <p id="score">Rocks: 0</p>
        <p id="perClick">Per Click: 1</p>
        <p id="perSecond">Per Second: 0</p>
        <p id="prestige">Prestige Multiplier: x1</p>
        <p id="combo">Combo: 0 (x1)</p>

        <button id="prestigeBtn" style="padding:10px;background:#444;color:white;border:none;cursor:pointer;">
            Prestige
        </button>

        <p id="currentPlayerLabel">Player: Guest</p>
    </div>

    <div class="shop">
        <h2>Shop</h2>
        <button onclick="buyUpgrade('clickPower')">Click Power (<span id="clickPowerCost">10</span>)</button>
        <button onclick="buyUpgrade('autoMiner')">Auto Miner (<span id="autoMinerCost">50</span>)</button>
        <button onclick="buyUpgrade('drill')">Drill (<span id="drillCost">200</span>)</button>
        <button onclick="buyUpgrade('factory')">Factory (<span id="factoryCost">1000</span>)</button>
        <button onclick="buyUpgrade('quarry')">Quarry (<span id="quarryCost">5000</span>)</button>
        <button onclick="buyUpgrade('robot')">Robot (<span id="robotCost">20000</span>)</button>
        <button onclick="buyUpgrade('volcano')">Volcano (<span id="volcanoCost">100000</span>)</button>
    </div>

    <div>
        <h2>Achievements</h2>
        <div id="achList"></div>

        <h2>Leaderboard</h2>
        <pre id="leaderboardList" style="text-align:left;"></pre>
    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- YOUR GAME CODE -->
<script src="game.js"></script>

</body>
</html>
